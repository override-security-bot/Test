<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEST</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* animated gradient background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff6600,#ff0000,#ff6600,#ff2200);
background-size:400% 400%;
animation:bgmove 12s infinite linear;
opacity:0.08;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translate(0,0)}
50%{transform:translate(-25%,-25%)}
100%{transform:translate(0,0)}
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h1{
color:#ff6600;
letter-spacing:4px;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#ff6600;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* GLITCH TITLE */

.glitch{
font-size:120px;
font-weight:bold;
color:white;
position:relative;
letter-spacing:10px;
animation:flicker 3s infinite;
}

.glitch::before,
.glitch::after{
content:"TEST";
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
}

.glitch::before{
color:#ff6600;
z-index:-1;
transform:translate(3px,3px);
}

.glitch::after{
color:red;
z-index:-2;
transform:translate(-3px,-3px);
}

@keyframes flicker{
0%,19%,21%,23%,25%,54%,56%,100%{
text-shadow:0 0 10px #ff6600,0 0 20px #ff6600;
}
20%,24%,55%{
text-shadow:none;
}
}

/* BUTTON */

.btn{
margin-top:40px;
padding:18px 45px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff6600;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 25px #ff6600;
}

.btn:hover{
transform:scale(1.15);
box-shadow:0 0 50px #ff6600;
}

/* SECTION */

.section{
padding:120px 10%;
text-align:center;
}

.section h3{
font-size:45px;
color:#ff6600;
margin-bottom:50px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
background:#111;
border-radius:12px;
padding:40px;
border:1px solid #222;
transition:0.4s;
}

.card:hover{
transform:translateY(-15px) scale(1.05);
box-shadow:0 0 40px rgba(255,102,0,0.5);
}

footer{
text-align:center;
padding:40px;
border-top:1px solid #222;
margin-top:80px;
}

</style>
</head>

<body>

<nav>
<h1>TEST</h1>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">

<h2 class="glitch">TEST</h2>

<button class="btn">ORDER DECALS</button>

</section>


<section class="section">

<h3>WHY TEST</h3>

<div class="cards">

<div class="card">
<h4>Premium Vinyl</h4>
<p>Built to survive dirt, mud, and high speed riding.</p>
</div>

<div class="card">
<h4>Custom Designs</h4>
<p>Personal graphics made for your exact bike.</p>
</div>

<div class="card">
<h4>Moto Inspired</h4>
<p>Designed with motocross and e-bike race style.</p>
</div>

</div>

</section>

<footer>

<p>© 2026 TEST</p>

</footer>

</body>
</html>
